<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

<body>
    <nav class="navbar">
        <div class="hamburger" onclick="toggleMenu()">☰</div>

        <ul class="nav-links">

        </ul>
    </nav>

    <section class="login-section">
        <h2>User Login</h2>

        <!-- Add form tag for proper form submission -->
        <form class="login-form" id="loginForm" onsubmit="loginUser(event)">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <div class="btn-group">
                <button class="btn-grad" type="submit">Login</button>
                <button class="btn-grad" type="reset">Reset</button>
            </div>
        </form>

        <p class="note">Don’t have an account? <a href="register.html"><img class="register" src="./image/registration.png" alt="">Register</a></p>
    </section>

    <script>
        // Form submission logic - Now using API
    </script>
    <script src="main-api.js"></script>
    <script src="script.js"></script>

</body>
